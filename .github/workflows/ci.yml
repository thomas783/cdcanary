name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest -q

  # Real MySQL + Postgres via testcontainers, seeded with examples/demo —
  # exercises the actual adapters (dialect SQL, coarse-type normalization)
  # and keeps the README demo honest.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[all,dev]"

      - name: Integration tests
        run: uv run pytest -m integration -v
