name: Release

# Publishes to PyPI via trusted publishing (no API token stored anywhere).
# Trigger: push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# One-time setup required on PyPI — see RELEASING.md.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"

      - name: Test before shipping
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv run ruff check src tests
          uv run pytest -q

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
