# CDCanary demo — a MySQL "source" and a PostgreSQL "replica" with
# deliberately injected replication drift. See ../../README.md.
services:
  source:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: shop
    ports: ["13306:3306"]
    volumes:
      - ./seed-source.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdemo"]
      interval: 2s
      retries: 30

  replica:
    image: postgres:16
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: shop
    ports: ["15432:5432"]
    volumes:
      - ./seed-replica.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 2s
      retries: 30
